[theme]
# اللون البرتقالي المميز لشركة Outsourcing Skill (بيطبق على الزراير والتحميل)
primaryColor = "#F05A28" 

# لون خلفية الموقع الأساسية (أبيض ناصع زي مواقع الشركات)
backgroundColor = "#FFFFFF"

# لون خلفية القائمة الجانبية والمربعات (رمادي فاتح جداً عشان يفصل بين القائمة والمحتوى بشياكة)
secondaryBackgroundColor = "#F4F6F9"

# لون النصوص (كحلي غامق جداً يميل للأسود، أريح للعين من الأسود الصريح وأشيك)
textColor = "#1E2022"

# نوع الخط (خط مؤسسي نظيف وحديث)
font = "sans serif"